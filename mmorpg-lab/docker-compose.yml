version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: mmorpg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes # Enables data persistence so servers stay registered if Redis restarts

volumes:
  redis_data: